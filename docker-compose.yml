services:
  api:
    build: .
    image: ai-regression-validation-framework:local
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/ai_regression
      SENTENCE_TRANSFORMER_MODEL: all-MiniLM-L6-v2
      SENTENCE_TRANSFORMERS_HOME: /models/sentence-transformers
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_regression
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d ai_regression
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
